# Windows CI pipeline for cloudflared
# Handles building and packaging for Windows targets (amd64, 386, arm64)

.windows-defaults: &windows-defaults
  tags:
    - windows
  before_script:
    - $env:GOPATH = "$env:CI_PROJECT_DIR\.go"
    - $env:PATH = "$env:GOPATH\bin;$env:PATH"
    - go version
    - go env

build-windows-amd64:
  <<: *windows-defaults
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  variables:
    GOOS: windows
    GOARCH: amd64
    TARGET_OS: windows
    TARGET_ARCH: amd64
  script:
    - go build -v -ldflags "-X main.Version=$env:VERSION -X main.BuildTime=$(Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ')" -o cloudflared-windows-amd64.exe ./cmd/cloudflared
  artifacts:
    paths:
      - cloudflared-windows-amd64.exe
    expire_in: 1 week

build-windows-386:
  <<: *windows-defaults
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  variables:
    GOOS: windows
    GOARCH: "386"
    TARGET_OS: windows
    TARGET_ARCH: "386"
  script:
    - go build -v -ldflags "-X main.Version=$env:VERSION -X main.BuildTime=$(Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ')" -o cloudflared-windows-386.exe ./cmd/cloudflared
  artifacts:
    paths:
      - cloudflared-windows-386.exe
    expire_in: 1 week

test-windows-amd64:
  <<: *windows-defaults
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  variables:
    GOOS: windows
    GOARCH: amd64
  script:
    - go test -v -count=1 -timeout 5m ./...
  needs:
    - build-windows-amd64

package-windows-msi-amd64:
  <<: *windows-defaults
  stage: package
  rules:
    - if: '$CI_COMMIT_TAG'
  variables:
    GOOS: windows
    GOARCH: amd64
  script:
    # Build the release binary with version info
    - go build -v -ldflags "-X main.Version=$env:CI_COMMIT_TAG -X main.BuildTime=$(Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ') -s -w" -o cloudflared.exe ./cmd/cloudflared
    # Package as MSI using WiX toolset (must be installed on runner)
    - >-
      if (Get-Command candle.exe -ErrorAction SilentlyContinue) {
        candle.exe -arch x64 -dVersion=$env:CI_COMMIT_TAG -dBinaryPath=cloudflared.exe packaging\cloudflared.wxs -o cloudflared.wixobj;
        light.exe -ext WixUIExtension cloudflared.wixobj -o cloudflared-amd64.msi;
      } else {
        Write-Host "WiX toolset not found, skipping MSI packaging";
        Copy-Item cloudflared.exe cloudflared-amd64.exe;
      }
  artifacts:
    paths:
      - cloudflared-amd64.msi
      - cloudflared-amd64.exe
    expire_in: 4 weeks
  needs:
    - build-windows-amd64
