# Main GitLab CI/CD pipeline configuration for cloudflared
# This file orchestrates all platform-specific build and test pipelines

include:
  - local: '.ci/commons.gitlab-ci.yml'
  - local: '.ci/ci-image.gitlab-ci.yml'
  - local: '.ci/linux.gitlab-ci.yml'
  - local: '.ci/mac.gitlab-ci.yml'
  - local: '.ci/windows.gitlab-ci.yml'
  - local: '.ci/apt-internal.gitlab-ci.yml'
  - local: '.ci/github.gitlab-ci.yml'

stages:
  - build-image
  - test
  - build
  - package
  - release
  - publish

variables:
  GO_VERSION: "1.22"
  RUST_VERSION: "1.77.0"
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  GOPATH: "${CI_PROJECT_DIR}/.go"
  GOPROXY: "https://proxy.golang.org,direct"
  # Docker image used for builds
  BUILD_IMAGE: "${CI_REGISTRY_IMAGE}/build:latest"

# Default settings applied to all jobs unless overridden
default:
  tags:
    - linux
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# Cache Go modules and build artifacts across pipeline runs
.go-cache:
  cache:
    key:
      files:
        - go.sum
    paths:
      - .go/pkg/mod
      - .cache/go-build
    policy: pull-push
